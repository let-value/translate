name: ci

on:
    pull_request:

permissions:
    contents: read

env:
    NODE_VERSION: "24"
    BUN_VERSION: "1.3.14"

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: voidzero-dev/setup-vp@v1
              with:
                  node-version: ${{ env.NODE_VERSION }}
            - run: vp install
            - run: vp exec --filter @let-value/translate-react -- playwright install chromium
            - run: vp run build
            - run: vp check
            - run: vp run test
            - run: vp run typecheck

    compile:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: voidzero-dev/setup-vp@v1
              with:
                  node-version: ${{ env.NODE_VERSION }}
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: ${{ env.BUN_VERSION }}
            - run: vp install
            - run: vp run @let-value/translate-extract#build
            - run: vp run @let-value/translate-extract-static#compile
            - run: find extract-static/npm -path "*/prebuilts/*" -type f
            - run: ../../npm/linux-x64-gnu/prebuilts/extract-linux-x64
              working-directory: extract-static/tests/fixture
