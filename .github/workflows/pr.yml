name: ci

on:
    pull_request:

permissions:
    contents: read

env:
    NODE_VERSION: "22"
    BUN_VERSION: "1.3.8"

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: voidzero-dev/setup-vp@v1
              with:
                  node-version: ${{ env.NODE_VERSION }}
            - run: vp install
            - run: vp exec --filter @let-value/translate-react -- playwright install chromium
            - run: vp run build
            - run: vp check
            - run: vp run test
            - run: vp run typecheck

    compile:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: voidzero-dev/setup-vp@v1
              with:
                  node-version: ${{ env.NODE_VERSION }}
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: ${{ env.BUN_VERSION }}
            - run: vp install
            - run: bun run extract-static/scripts/compile.ts
            - run: ls -la extract-static/prebuilts
