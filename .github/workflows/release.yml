name: release

on:
  release:
    types: [published]

jobs:
  binaries:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
          - runner: ubuntu-24.04-arm
          - runner: windows-latest
          - runner: macos-15-intel
          - runner: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8
      - run: npm ci
      - run: npm run build --workspace extract
      - run: bun run extract-static/scripts/compile.ts
      - name: Upload binary to release
        if: ${{ !env.ACT }}
        run: gh release upload ${{ github.event.release.tag_name }} extract-static/prebuilts/* --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  publish-github-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false
          registry-url: https://npm.pkg.github.com
          scope: '@let-value'
      - run: npm ci
      - run: npm run build
      - name: Resolve npm publish tag
        id: npm-publish-tag
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          prerelease="${version#*-}"
          if [ "$prerelease" = "$version" ]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${prerelease%%.*}" >> "$GITHUB_OUTPUT"
          fi
      - run: npm publish --workspaces --access public --tag ${{ steps.npm-publish-tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}

  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - name: Resolve npm publish tag
        id: npm-publish-tag
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          prerelease="${version#*-}"
          if [ "$prerelease" = "$version" ]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${prerelease%%.*}" >> "$GITHUB_OUTPUT"
          fi
      - run: npm publish --workspaces --access public --tag ${{ steps.npm-publish-tag.outputs.tag }}
