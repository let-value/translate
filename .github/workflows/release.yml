name: release

on:
    release:
        types: [published]

env:
    NODE_VERSION: "24"
    BUN_VERSION: "1.3.14"

jobs:
    binaries:
        runs-on: ${{ matrix.runner }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - runner: ubuntu-24.04
                      artifact: linux-x64
                    - runner: ubuntu-24.04-arm
                      artifact: linux-arm64
                    - runner: windows-latest
                      artifact: windows-x64
                    - runner: macos-15-intel
                      artifact: darwin-x64
                    - runner: macos-15
                      artifact: darwin-arm64
        steps:
            - uses: actions/checkout@v6
            - uses: voidzero-dev/setup-vp@v1
              with:
                  node-version: ${{ env.NODE_VERSION }}
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: ${{ env.BUN_VERSION }}
            - run: vp install
            - run: vp run @let-value/translate-extract#build
            - run: vp run @let-value/translate-extract-static#compile
            - uses: actions/upload-artifact@v4
              with:
                  name: static-binaries-${{ matrix.artifact }}
                  path: extract-static/npm/*/prebuilts/*
                  if-no-files-found: error

    publish-github-packages:
        needs: binaries
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  package-manager-cache: false
                  registry-url: https://npm.pkg.github.com
                  scope: "@let-value"
            - uses: voidzero-dev/setup-vp@v1
              with:
                  node-version: ${{ env.NODE_VERSION }}
            - run: vp install
            - uses: actions/download-artifact@v4
              with:
                  pattern: static-binaries-*
                  path: extract-static/npm
                  merge-multiple: true
            - run: vp run build
            - name: Resolve npm publish tag
              id: npm-publish-tag
              shell: bash
              run: |
                  version="$(node -p "require('./package.json').version")"
                  prerelease="${version#*-}"
                  if [ "$prerelease" = "$version" ]; then
                    echo "tag=latest" >> "$GITHUB_OUTPUT"
                  else
                    echo "tag=${prerelease%%.*}" >> "$GITHUB_OUTPUT"
                  fi
            - run: vp pm publish -r --access public --tag ${{ steps.npm-publish-tag.outputs.tag }} --no-git-checks
              env:
                  NODE_AUTH_TOKEN: ${{ github.token }}

    publish-npm:
        needs: binaries
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            contents: read
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  package-manager-cache: false
                  registry-url: https://registry.npmjs.org
            - uses: voidzero-dev/setup-vp@v1
              with:
                  node-version: ${{ env.NODE_VERSION }}
            - run: vp install
            - uses: actions/download-artifact@v4
              with:
                  pattern: static-binaries-*
                  path: extract-static/npm
                  merge-multiple: true
            - run: vp run build
            - name: Resolve npm publish tag
              id: npm-publish-tag
              shell: bash
              run: |
                  version="$(node -p "require('./package.json').version")"
                  prerelease="${version#*-}"
                  if [ "$prerelease" = "$version" ]; then
                    echo "tag=latest" >> "$GITHUB_OUTPUT"
                  else
                    echo "tag=${prerelease%%.*}" >> "$GITHUB_OUTPUT"
                  fi
            - run: vp pm publish -r --access public --tag ${{ steps.npm-publish-tag.outputs.tag }} --no-git-checks --provenance
